<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>扫码打开网页</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(100%, 430px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .qr-wrap {
      width: min(100%, 300px);
      margin: 24px auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    #qrcode svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      transition: background 150ms ease, transform 150ms ease;
    }

    .button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .address {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>扫码打开网页</h1>
    <p>二维码指向“网页”文件夹下的导航页面。</p>

    <div class="qr-wrap" id="qrcode" aria-label="扫码打开网页">
    </div>

    <a class="button" id="openLink" href="../网页/index.html" target="_blank" rel="noopener noreferrer">打开网页</a>

    <div class="address" id="address">../网页/index.html</div>
  </main>

  <script src="qrcode.js"></script>
  <script>
    const targetUrl = new URL("../网页/index.html", window.location.href).href;
    document.getElementById("openLink").href = targetUrl;
    document.getElementById("address").textContent = targetUrl;
    document.getElementById("qrcode").innerHTML = createQrSvg(targetUrl);
  </script>
</body>
</html>
